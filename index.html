<!DOCTYPE html>
<html>
<head>
    <title>Smart Accounts</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f7fb;
            text-align: center;
        }
        .card {
            background: white;
            padding: 30px;
            margin: 100px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        .status {
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>📊 Smart Accounts</h2>
    <p>Upload Excel & Process</p>

    <input type="file" id="fileInput" />
    <br><br>

    <button onclick="uploadFile()">Upload & Process</button>

    <div class="status" id="status"></div>
</div>

<script>
async function uploadFile() {
    const status = document.getElementById("status");
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];

    if (!file) {
        alert("Select a file");
        return;
    }

    status.innerText = "⏳ Uploading...";

    const formData = new FormData();
    formData.append("file", file);

    try {
        const response = await fetch("https://smartaccounts-backend-production.up.railway.app/upload-sales", {
            method: "POST",
            body: formData
        });

        const blob = await response.blob();

        const link = document.createElement("a");
        link.href = window.URL.createObjectURL(blob);
        link.download = "processed.xlsx";
        link.click();

        status.innerText = "✅ Done! File downloaded";

    } catch (error) {
        status.innerText = "❌ Error processing file";
    }
}
</script>

</body>
</html>
