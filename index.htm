<!DOCTYPE html>
<html>
<head>
    <title>Smart Accounts - Excel Upload</title>
</head>
<body style="text-align:center; margin-top:100px; font-family:Arial;">

    <h2>Upload Excel File</h2>

    <input type="file" id="fileInput" />
    <br><br>

    <button onclick="uploadFile()">Upload & Process</button>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];

            if (!file) {
                alert("Please select a file");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            try {
                const response = await fetch("https://smartaccounts-backend-production.up.railway.app/upload-sales", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    alert("Upload failed");
                    return;
                }

                const blob = await response.blob();

                const link = document.createElement("a");
                link.href = window.URL.createObjectURL(blob);
                link.download = "processed.xlsx";
                link.click();

            } catch (error) {
                alert("Error connecting to server");
                console.error(error);
            }
        }
    </script>

</body>
</html>
